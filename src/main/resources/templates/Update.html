<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Data Update</title>
    <link rel="stylesheet" th:href="@{/style.css(v=${@environment.getProperty('app.style.version')})}">
</head>

<body>

<div class="update-box">

    <form th:action="@{/form/update}" method="post" enctype="multipart/form-data" th:object="${form}">

        <h1>Update Hotel Data / Details</h1>

        <input type="hidden" th:field="*{id}">

        <label>Hotel Name</label>
        <input type="text" th:field="*{name}">
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-error"></div>

        <label>Permanent ID</label>
        <input type="text" th:field="*{permid}">
        <div th:if="${#fields.hasErrors('permid')}" th:errors="*{permid}" class="text-error"></div>

        <label>Contact Number</label>
        <input type="text" th:field="*{mob}">
        <div th:if="${#fields.hasErrors('mob')}" th:errors="*{mob}" class="text-error"></div>

        <label>Contact Email</label>
        <input type="email" th:field="*{email}">
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-error"></div>

        <label>Upload New Food License Proof</label>
        <input type="file" name="file">

        <label>City</label>
        <select th:field="*{city}">
            <option value="">Select City</option>
            <option value="Amravati">Amravati</option>
            <option value="Nagpur">Nagpur</option>
            <option value="Pune">Pune</option>
            <option value="Mumbai">Mumbai</option>
        </select>
        <div th:if="${#fields.hasErrors('city')}" th:errors="*{city}" class="text-error"></div>

        <label>Address</label>
        <input type="text" th:field="*{address}">
        <div th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-error"></div>

        <label>Estimated Distance to NGO Delivery Zone (km)</label>
        <input type="number" min="0" th:field="*{distanceInKm}" placeholder="5">
        <div th:if="${#fields.hasErrors('distanceInKm')}" th:errors="*{distanceInKm}" class="text-error"></div>

        <input type="submit" value="Update">

    </form>

</div>

<div class="page-actions">
    <button type="button" class="btn btn-ghost" onclick="history.back()">Back</button>
</div>

</body>
</html>
