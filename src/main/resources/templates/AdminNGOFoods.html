<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - NGO Foods</title>
    <link rel="stylesheet" th:href="@{/style.css(v=${@environment.getProperty('app.style.version')})}">
</head>
<body>
    <div class="page-top-nav">
        <a class="site-brand" th:href="@{/form/show}">FoodRescueAI</a>
        <p class="site-brand-copy">Admin NGO food view</p>
    </div>

    <main class="page-shell admin-ngo-food-page">
        <h1>Foods for NGO: <span th:text="${ngo.name}"></span></h1>
        <p class="helper-text">Inspect foods associated with this NGO and take admin actions.</p>

        <section th:if="${foodWithHotel.size()} > 0" class="food-claims-card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Food Name</th>
                            <th>Food Type</th>
                            <th>Quantity</th>
                            <th>Status</th>
                            <th>Hotel Name</th>
                            <th>Hotel Contact</th>
                            <th>Hotel Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${foodWithHotel}">
                            <td th:text="${item.food.foodName}"></td>
                            <td th:text="${item.food.foodType}"></td>
                            <td th:text="${item.food.quantity} + ' ' + ${item.food.quantityUnit}"></td>
                            <td><span class="status-pill" th:classappend="' ' + ${#strings.toLowerCase(item.food.status.name())}" th:text="${item.food.status}"></span></td>
                            <td th:text="${item.hotel.name}"></td>
                            <td th:text="${item.hotel.mob}"></td>
                            <td th:text="${item.hotel.address}"></td>
                            <td>
                                <a th:href="@{'/set/delete-food/'+${item.food.id}}" onclick="return confirm('Delete this food item?')">Delete Food</a>
                                |
                                <a th:href="@{'/set/undo-food/'+${item.food.id}}" onclick="return confirm('Undo status and make available again?')">Undo</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div th:if="${foodWithHotel.size()} == 0" class="empty-state-card">
            <p>No foods associated with this NGO.</p>
        </div>

        <div class="page-actions">
            <a class="btn btn-ghost" th:href="@{/set/dashboard}">Back to Dashboard</a>
        </div>
    </main>
</body>
</html>
